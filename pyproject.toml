requires-python = ">=3.13"
dependencies = [
    "faker>=40.8.0",
    "marimo>=0.20.4",
    "duckdb>=1.1.0",
    "pandas>=2.2.0",
    "plotly>=5.20.0",
    "cssbeautifier>=1.15.4",
    "jsbeautifier>=1.15.4",
    "poethepoet>=0.32.0",
]

[dependency-groups]
dev = [
    "poethepoet>=0.42.1",
    "pytest>=8.0.0",
    "ruff>=0.9.0",
]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.poe.tasks]
fmt    = "python format.py"
server = "python -m http.server 8000"
save   = "git add . && git commit -m 'update' && git push"

#function server { uv run poe server }
#function fmt { uv run poe fmt }
#function save { uv run poe save }
